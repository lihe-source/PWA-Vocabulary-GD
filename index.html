<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#101426">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>英文單字複習 PWA</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <div>
        <h1>英文單字複習</h1>
        <p id="auth-subtitle">Google Drive 持續登入優化版</p>
      </div>
      <span class="version">V5_2</span>
    </header>

    <main class="content">
      <section class="card status-card">
        <div class="status-row">
          <div>
            <h2>Google Drive 雲端備份</h2>
            <p id="drive-status">尚未登入</p>
          </div>
          <div id="status-pill" class="pill off">離線</div>
        </div>
        <div class="button-grid">
          <button id="btn-signin" class="primary">登入 Google</button>
          <button id="btn-refresh" class="secondary">靜默恢復登入</button>
          <button id="btn-backup" class="secondary">立即備份</button>
          <button id="btn-restore" class="secondary">列出備份</button>
          <button id="btn-signout" class="danger">登出</button>
        </div>
        <p class="hint">此版會保存「登入狀態、Email、token 到期時間」，重新開啟 PWA 時先恢復有效 token；若 token 過期，會自動用 Google session 嘗試靜默換新 token。</p>
      </section>

      <section class="card">
        <h2>Google Drive 設定</h2>
        <label>OAuth Client ID
          <input id="client-id" placeholder="貼上 Google OAuth Web Client ID">
        </label>
        <label>Google Drive 資料夾 ID（選填）
          <input id="folder-id" placeholder="留空則備份到使用者 Drive 根目錄">
        </label>
        <label class="switch-row">
          <span>開啟後自動備份</span>
          <input id="auto-sync" type="checkbox">
        </label>
        <button id="btn-save-settings" class="primary full">儲存設定</button>
      </section>

      <section class="card">
        <h2>單字資料測試區</h2>
        <div class="word-form">
          <input id="word-en" placeholder="English">
          <input id="word-zh" placeholder="中文">
          <button id="btn-add-word" class="primary">新增</button>
        </div>
        <ul id="word-list" class="word-list"></ul>
      </section>

      <section class="card">
        <h2>備份清單</h2>
        <div id="backup-list" class="backup-list empty">尚未讀取備份。</div>
      </section>
    </main>

    <nav class="bottom-nav">
      <span>Home</span><span>Practice</span><span>Settings</span>
    </nav>
  </div>
  <div id="toast"></div>
  <script src="./app.js"></script>
</body>
</html>
